<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>× Tables</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #6a6a80;
    --accent: #00e5a0;
    --accent-dim: #00e5a020;
    --danger: #ff4466;
    --danger-dim: #ff446620;
    --warn: #ffaa33;
    --warn-dim: #ffaa3320;
    --blue: #4488ff;
    --blue-dim: #4488ff20;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app { max-width: 640px; margin: 0 auto; padding: 20px 16px; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; margin-bottom: 24px; border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px;
  }
  .header h1 span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; }
  .header-actions button {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); padding: 6px 10px; border-radius: 6px;
    font-family: inherit; font-size: 0.75rem; cursor: pointer;
    transition: all 0.15s;
  }
  .header-actions button:hover { color: var(--text); border-color: var(--text-dim); }
  .header-actions button.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

  /* Nav tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; }
  .tab {
    flex: 1; padding: 10px; text-align: center; font-size: 0.75rem;
    font-weight: 500; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer; color: var(--text-dim);
    transition: all 0.15s; text-transform: uppercase; letter-spacing: 1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

  /* Drill view */
  .drill-area { text-align: center; padding: 32px 0; }
  .streak-bar {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 32px; font-size: 0.75rem; color: var(--text-dim);
  }
  .streak-bar .streak-count { color: var(--accent); font-weight: 600; font-size: 0.85rem; }
  .streak-dots { display: flex; gap: 3px; }
  .streak-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border); transition: background 0.3s;
  }
  .streak-dot.correct { background: var(--accent); }
  .streak-dot.wrong { background: var(--danger); }

  .question {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 3.2rem; font-weight: 700; margin-bottom: 32px;
    letter-spacing: -1px; line-height: 1;
  }
  .question .op { color: var(--accent); margin: 0 4px; }

  .answer-input {
    background: var(--surface); border: 2px solid var(--border);
    color: var(--text); font-family: 'Space Grotesk', sans-serif;
    font-size: 2.4rem; font-weight: 600; text-align: center;
    padding: 12px 20px; border-radius: 12px; width: 200px;
    outline: none; transition: border-color 0.15s;
    -moz-appearance: textfield;
  }
  .answer-input::-webkit-outer-spin-button,
  .answer-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .answer-input:focus { border-color: var(--accent); }
  .answer-input.correct { border-color: var(--accent); background: var(--accent-dim); }
  .answer-input.wrong { border-color: var(--danger); background: var(--danger-dim); }

  .feedback {
    margin-top: 20px; font-size: 0.85rem; min-height: 24px;
    transition: opacity 0.2s;
  }
  .feedback.correct-fb { color: var(--accent); }
  .feedback.slow-fb { color: var(--warn); }
  .feedback.wrong-fb { color: var(--danger); }

  .fact-meta {
    margin-top: 24px; font-size: 0.7rem; color: var(--text-dim);
    display: flex; justify-content: center; gap: 16px;
  }
  .fact-meta span b { color: var(--text); }

  /* Stats view */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
  }
  .stat-card .label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .stat-card .value { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; }
  .stat-card .value.green { color: var(--accent); }
  .stat-card .value.red { color: var(--danger); }
  .stat-card .value.yellow { color: var(--warn); }
  .stat-card .value.blue { color: var(--blue); }

  /* Heatmap */
  .heatmap-section { margin-bottom: 24px; }
  .heatmap-section h3 {
    font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 12px;
  }
  .heatmap-container { overflow-x: auto; padding-bottom: 8px; }
  .heatmap {
    display: grid; gap: 2px; width: fit-content; min-width: 100%;
  }
  .hm-cell {
    width: 28px; height: 28px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.55rem; color: transparent; transition: all 0.15s;
    cursor: default; position: relative;
  }
  .hm-cell:hover { color: var(--text); z-index: 1; transform: scale(1.3); }
  .hm-cell.unseen { background: var(--surface); }
  .hm-cell.mastered { background: #00e5a044; }
  .hm-cell.good { background: #00e5a028; }
  .hm-cell.learning { background: #ffaa3330; }
  .hm-cell.struggling { background: #ff446630; }
  .hm-header {
    width: 28px; height: 28px; display: flex; align-items: center;
    justify-content: center; font-size: 0.6rem; color: var(--text-dim);
    font-weight: 600;
  }

  /* Weak facts list */
  .weak-list { margin-bottom: 24px; }
  .weak-list h3 {
    font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 12px;
  }
  .weak-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 4px; font-size: 0.8rem;
  }
  .weak-item .fact { font-weight: 600; }
  .weak-item .detail { color: var(--text-dim); font-size: 0.7rem; }
  .weak-item .pct { font-weight: 600; }
  .weak-item .pct.bad { color: var(--danger); }
  .weak-item .pct.ok { color: var(--warn); }

  /* Settings */
  .settings-section { margin-bottom: 24px; }
  .settings-section h3 {
    font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 12px;
  }
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 6px;
  }
  .setting-row label { font-size: 0.8rem; }
  .setting-row input[type="number"] {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 0.85rem;
    padding: 6px 10px; border-radius: 6px; width: 70px; text-align: center;
    outline: none;
  }
  .setting-row input[type="number"]:focus { border-color: var(--accent); }

  .btn-danger {
    background: var(--danger-dim); border: 1px solid var(--danger);
    color: var(--danger); padding: 10px 20px; border-radius: 8px;
    font-family: inherit; font-size: 0.8rem; cursor: pointer;
    transition: all 0.15s; width: 100%; margin-top: 12px;
  }
  .btn-danger:hover { background: var(--danger); color: var(--bg); }

  .empty-state {
    text-align: center; padding: 48px 20px; color: var(--text-dim);
    font-size: 0.85rem; line-height: 1.6;
  }

  /* Session summary overlay */
  .summary-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #0a0a0fee; display: flex; align-items: center;
    justify-content: center; z-index: 100; padding: 20px;
  }
  .summary-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px; max-width: 400px; width: 100%;
    text-align: center;
  }
  .summary-card h2 {
    font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem;
    margin-bottom: 20px;
  }
  .summary-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .summary-stat .label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .summary-stat .val { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; }
  .btn-primary {
    background: var(--accent); color: var(--bg); border: none;
    padding: 12px 24px; border-radius: 8px; font-family: inherit;
    font-size: 0.85rem; font-weight: 600; cursor: pointer; width: 100%;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.85; }

  .hidden { display: none !important; }

  /* Responsive */
  @media (max-width: 480px) {
    .question { font-size: 2.4rem; }
    .answer-input { font-size: 1.8rem; width: 160px; }
    .hm-cell, .hm-header { width: 22px; height: 22px; font-size: 0.5rem; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1><span>×</span> Tables</h1>
    <div class="header-actions">
      <button id="sessionBtn" title="Session info">0/0</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="drill">Drill</div>
    <div class="tab" data-tab="stats">Stats</div>
    <div class="tab" data-tab="grid">Grid</div>
    <div class="tab" data-tab="settings">Config</div>
  </div>

  <!-- DRILL -->
  <div id="drill-view">
    <div class="drill-area">
      <div class="streak-bar">
        <span>streak</span>
        <span class="streak-count" id="streakCount">0</span>
        <div class="streak-dots" id="streakDots"></div>
      </div>
      <div class="question" id="question">—</div>
      <input type="number" class="answer-input" id="answerInput" autocomplete="off" inputmode="numeric">
      <div class="feedback" id="feedback">&nbsp;</div>
      <div class="fact-meta" id="factMeta"></div>
    </div>
  </div>

  <!-- STATS -->
  <div id="stats-view" class="hidden">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="weak-list" id="weakList"></div>
  </div>

  <!-- GRID HEATMAP -->
  <div id="grid-view" class="hidden">
    <div class="heatmap-section">
      <h3>Mastery Heatmap</h3>
      <div class="heatmap-container">
        <div class="heatmap" id="heatmap"></div>
      </div>
      <div style="display:flex;gap:12px;margin-top:10px;font-size:0.6rem;color:var(--text-dim);flex-wrap:wrap;">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--surface);vertical-align:middle;"></span> unseen</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#ff446630;vertical-align:middle;"></span> struggling</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#ffaa3330;vertical-align:middle;"></span> learning</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#00e5a028;vertical-align:middle;"></span> good</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#00e5a044;vertical-align:middle;"></span> mastered</span>
      </div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="settings-view" class="hidden">
    <div class="settings-section">
      <h3>Range</h3>
      <div class="setting-row">
        <label>Min factor</label>
        <input type="number" id="setMin" min="2" max="50" value="2">
      </div>
      <div class="setting-row">
        <label>Max factor</label>
        <input type="number" id="setMax" min="2" max="50" value="20">
      </div>
    </div>
    <div class="settings-section">
      <h3>Session</h3>
      <div class="setting-row">
        <label>Questions per session</label>
        <input type="number" id="setSession" min="5" max="100" value="20">
      </div>
    </div>
    <div class="settings-section">
      <h3>Data</h3>
      <button class="btn-danger" id="resetBtn">Reset All Progress</button>
    </div>
  </div>
</div>

<!-- Session summary -->
<div class="summary-overlay hidden" id="summaryOverlay">
  <div class="summary-card">
    <h2>Session Complete</h2>
    <div class="summary-stats" id="summaryStats"></div>
    <button class="btn-primary" id="summaryClose">Continue</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'xt_data_v2';
const SETTINGS_KEY = 'xt_settings_v1';

// --- State ---
let facts = {};    // "a×b" -> { ef, interval, reps, nextReview, correct, total, avgTime, lastSeen }
let settings = { min: 2, max: 20, sessionLen: 20 };
let session = { correct: 0, total: 0, times: [], startedAt: null };
let streak = 0;
let recentResults = []; // last 10: true/false
let currentFact = null;
let questionStart = 0;
let feedbackTimeout = null;

// --- Persistence ---
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(facts));
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}
function load() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) facts = JSON.parse(d);
    const s = localStorage.getItem(SETTINGS_KEY);
    if (s) settings = JSON.parse(s);
  } catch(e) { console.error(e); }
}

// --- SM-2 Spaced Repetition (simplified) ---
function getFactData(key) {
  if (!facts[key]) {
    facts[key] = { ef: 2.5, interval: 0, reps: 0, nextReview: 0, correct: 0, total: 0, avgTime: 0, lastSeen: 0 };
  }
  return facts[key];
}

function updateFact(key, correct, timeMs) {
  const f = getFactData(key);
  f.total++;
  f.lastSeen = Date.now();

  // Running avg time (exponential moving average)
  f.avgTime = f.avgTime ? (f.avgTime * 0.7 + timeMs * 0.3) : timeMs;

  if (correct) {
    f.correct++;
    // Quality grades — unforgiving speed thresholds:
    // 5 = instant recall (<1s) — true mastery
    // 4 = quick (<2.5s) — solid
    // 3 = ok (<4s) — knows it but has to think
    // 2 = slow (<7s) — barely knows it, keep drilling
    // 1 = very slow (7s+) — treat almost like wrong, needs work
    const q = timeMs < 1000 ? 5 : timeMs < 2500 ? 4 : timeMs < 4000 ? 3 : timeMs < 7000 ? 2 : 1;

    f.ef = Math.max(1.3, f.ef + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));

    if (q >= 3) {
      // Confident answer — advance normally
      f.reps++;
      if (f.reps === 1) f.interval = 1;
      else if (f.reps === 2) f.interval = 3;
      else f.interval = Math.round(f.interval * f.ef);
      f.nextReview = Date.now() + f.interval * 86400000;
    } else {
      // Correct but slow — don't advance reps, review again soon
      // q=2: review in 2 hours, q=1: review in 30 min
      f.reps = Math.max(0, f.reps - 1);
      f.interval = 0;
      f.nextReview = Date.now() + (q === 2 ? 7200000 : 1800000);
    }
  } else {
    f.reps = 0;
    f.interval = 0;
    f.ef = Math.max(1.3, f.ef - 0.2);
    // Wrong — review in 10 min
    f.nextReview = Date.now() + 600000;
  }
  save();
}

// --- Fact Selection (priority queue) ---
function allFactKeys() {
  const keys = [];
  for (let a = settings.min; a <= settings.max; a++) {
    for (let b = a; b <= settings.max; b++) {
      // Skip facts where BOTH factors ≤ 10 (already mastered)
      if (a <= 10 && b <= 10) continue;
      keys.push(`${a}×${b}`);
    }
  }
  return keys;
}

function pickFact() {
  const now = Date.now();
  const keys = allFactKeys();
  const SPEED_THRESHOLD = 2500; // 2.5s = "fast enough" to count as known

  // Score each fact: lower = higher priority
  const scored = keys.map(key => {
    const f = facts[key];
    if (!f) return { key, score: -1000 + Math.random() * 200 }; // unseen = high priority

    const overdue = now - f.nextReview; // positive = overdue
    const accuracy = f.total > 0 ? f.correct / f.total : 0.5;
    const recentPenalty = (now - f.lastSeen) < 30000 ? 8000 : 0; // don't repeat within 30s

    // Speed factor: slow avg time = needs more drilling
    // Normalize: 0 (instant) to 1 (7s+), then invert for score
    const speedWeakness = f.avgTime ? Math.min(f.avgTime / 7000, 1) : 0.5;

    // Priority formula:
    // - overdue facts (negative = not yet due, positive = overdue) → lower score = higher priority
    // - low accuracy → lower score
    // - slow speed → lower score (needs drilling)
    // - recently seen → penalty (higher score)
    let score = -overdue
      + (accuracy * 1500)
      - (speedWeakness * 2000)  // slow facts get big priority boost
      + recentPenalty;

    return { key, score };
  });

  scored.sort((a, b) => a.score - b.score);

  // Pick from top 5 with randomness
  const pool = scored.slice(0, Math.min(5, scored.length));
  return pool[Math.floor(Math.random() * pool.length)].key;
}

function parseFact(key) {
  const [a, b] = key.split('×').map(Number);
  // Randomly swap order for presentation
  return Math.random() < 0.5 ? [a, b] : [b, a];
}

// --- UI ---
const $ = id => document.getElementById(id);
const views = ['drill-view', 'stats-view', 'grid-view', 'settings-view'];

function showView(name) {
  views.forEach(v => $(v).classList.toggle('hidden', v !== name + '-view'));
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === name)
  );
  if (name === 'stats') renderStats();
  if (name === 'grid') renderHeatmap();
  if (name === 'settings') loadSettings();
  if (name === 'drill') $('answerInput').focus();
}

document.querySelectorAll('.tab').forEach(t =>
  t.addEventListener('click', () => showView(t.dataset.tab))
);

// --- Drill ---
function newQuestion() {
  if (session.total >= settings.sessionLen && session.startedAt) {
    showSessionSummary();
    return;
  }
  currentFact = pickFact();
  const [a, b] = parseFact(currentFact);
  $('question').innerHTML = `${a} <span class="op">×</span> ${b}`;
  $('answerInput').value = '';
  $('answerInput').className = 'answer-input';
  $('feedback').innerHTML = '&nbsp;';
  $('answerInput').disabled = false;
  $('answerInput').focus();
  questionStart = Date.now();

  // Show fact meta
  const f = facts[currentFact];
  if (f && f.total > 0) {
    const pct = Math.round((f.correct / f.total) * 100);
    const avg = (f.avgTime / 1000).toFixed(1);
    $('factMeta').innerHTML = `<span><b>${pct}%</b> accuracy</span><span><b>${avg}s</b> avg</span><span><b>${f.total}</b> seen</span>`;
  } else {
    $('factMeta').innerHTML = `<span>new fact</span>`;
  }

  updateSessionBtn();
}

function submitAnswer() {
  const val = $('answerInput').value.trim();
  if (!val) return;

  const answer = parseInt(val);
  const [a, b] = currentFact.split('×').map(Number);
  const correct = answer === a * b;
  const timeMs = Date.now() - questionStart;

  if (!session.startedAt) session.startedAt = Date.now();
  session.total++;
  if (correct) session.correct++;
  session.times.push(timeMs);

  updateFact(currentFact, correct, timeMs);

  // Streak
  if (correct) { streak++; } else { streak = 0; }
  recentResults.push(correct);
  if (recentResults.length > 10) recentResults.shift();
  renderStreak();

  // Visual feedback
  $('answerInput').className = 'answer-input ' + (correct ? 'correct' : 'wrong');
  $('answerInput').disabled = true;

  if (correct) {
    const speed = timeMs < 1000 ? '⚡ instant' : timeMs < 2500 ? '✓ quick' : timeMs < 4000 ? '✓ ok' : timeMs < 7000 ? '⏳ slow' : '🐌 too slow';
    $('feedback').innerHTML = `${speed} · ${(timeMs/1000).toFixed(1)}s`;
    $('feedback').className = timeMs < 4000 ? 'feedback correct-fb' : 'feedback slow-fb';
  } else {
    $('feedback').innerHTML = `${a} × ${b} = ${a * b}`;
    $('feedback').className = 'feedback wrong-fb';
  }

  updateSessionBtn();

  clearTimeout(feedbackTimeout);
  feedbackTimeout = setTimeout(() => newQuestion(), correct ? 600 : 2000);
}

$('answerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAnswer();
});

function renderStreak() {
  $('streakCount').textContent = streak;
  const dots = recentResults.slice(-10).map(r =>
    `<div class="streak-dot ${r ? 'correct' : 'wrong'}"></div>`
  ).join('');
  $('streakDots').innerHTML = dots;
}

function updateSessionBtn() {
  $('sessionBtn').textContent = `${session.total}/${settings.sessionLen}`;
}

function showSessionSummary() {
  const pct = session.total > 0 ? Math.round((session.correct / session.total) * 100) : 0;
  const avgTime = session.times.length > 0
    ? (session.times.reduce((a, b) => a + b, 0) / session.times.length / 1000).toFixed(1)
    : '—';
  const elapsed = ((Date.now() - session.startedAt) / 1000).toFixed(0);

  $('summaryStats').innerHTML = `
    <div class="summary-stat"><div class="label">Accuracy</div><div class="val" style="color:${pct >= 80 ? 'var(--accent)' : pct >= 60 ? 'var(--warn)' : 'var(--danger)'}">${pct}%</div></div>
    <div class="summary-stat"><div class="label">Avg Speed</div><div class="val" style="color:var(--blue)">${avgTime}s</div></div>
    <div class="summary-stat"><div class="label">Correct</div><div class="val">${session.correct}/${session.total}</div></div>
    <div class="summary-stat"><div class="label">Time</div><div class="val">${elapsed}s</div></div>
  `;
  $('summaryOverlay').classList.remove('hidden');
}

$('summaryClose').addEventListener('click', () => {
  $('summaryOverlay').classList.add('hidden');
  session = { correct: 0, total: 0, times: [], startedAt: null };
  streak = 0;
  recentResults = [];
  renderStreak();
  newQuestion();
});

// --- Stats ---
function renderStats() {
  const keys = allFactKeys();
  let totalCorrect = 0, totalAnswered = 0, totalSeen = 0, totalTime = 0, timeCount = 0;

  keys.forEach(k => {
    const f = facts[k];
    if (f && f.total > 0) {
      totalSeen++;
      totalCorrect += f.correct;
      totalAnswered += f.total;
      totalTime += f.avgTime;
      timeCount++;
    }
  });

  const overallPct = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
  const avgSpeed = timeCount > 0 ? (totalTime / timeCount / 1000).toFixed(1) : '—';
  const coverage = Math.round((totalSeen / keys.length) * 100);

  // Mastered = accuracy ≥ 90%, reps ≥ 3, AND avg speed < 2.5s
  let mastered = 0;
  keys.forEach(k => {
    const f = facts[k];
    if (f && f.total >= 3 && (f.correct / f.total) >= 0.9 && f.reps >= 3 && f.avgTime < 2500) mastered++;
  });

  $('statsGrid').innerHTML = `
    <div class="stat-card"><div class="label">Accuracy</div><div class="value ${overallPct >= 80 ? 'green' : overallPct >= 60 ? 'yellow' : 'red'}">${overallPct}%</div></div>
    <div class="stat-card"><div class="label">Avg Speed</div><div class="value blue">${avgSpeed}s</div></div>
    <div class="stat-card"><div class="label">Coverage</div><div class="value">${coverage}%</div></div>
    <div class="stat-card"><div class="label">Mastered</div><div class="value green">${mastered}/${keys.length}</div></div>
  `;

  // Weak facts: low accuracy OR slow despite being accurate
  const weak = keys
    .filter(k => facts[k] && facts[k].total >= 2)
    .map(k => {
      const f = facts[k];
      const pct = Math.round((f.correct / f.total) * 100);
      const avg = f.avgTime / 1000;
      // "Weak" = low accuracy OR accurate but slow (>3s avg)
      const isWeak = pct < 80 || (pct >= 80 && avg > 3);
      return { key: k, ...f, pct, avg, isWeak, isSlow: pct >= 80 && avg > 3 };
    })
    .filter(f => f.isWeak)
    .sort((a, b) => {
      // Sort: wrong facts first, then slow facts by speed
      if (a.pct < 80 && b.pct >= 80) return -1;
      if (a.pct >= 80 && b.pct < 80) return 1;
      if (a.pct < 80 && b.pct < 80) return a.pct - b.pct;
      return b.avg - a.avg; // slowest first among slow-but-accurate
    })
    .slice(0, 12);

  if (weak.length > 0) {
    $('weakList').innerHTML = `<h3>Weak Spots</h3>` + weak.map(w => {
      const [a, b] = w.key.split('×');
      const tag = w.isSlow
        ? `<span class="pct ok">${w.avg.toFixed(1)}s</span>`
        : `<span class="pct ${w.pct < 50 ? 'bad' : 'ok'}">${w.pct}%</span>`;
      const reason = w.isSlow ? 'slow' : '';
      return `<div class="weak-item">
        <span class="fact">${a} × ${b} = ${parseInt(a) * parseInt(b)}</span>
        <span class="detail">${w.correct}/${w.total} · ${w.avg.toFixed(1)}s${reason ? ' · ' + reason : ''}</span>
        ${tag}
      </div>`;
    }).join('');
  } else {
    $('weakList').innerHTML = keys.some(k => facts[k]?.total > 0)
      ? `<h3>Weak Spots</h3><div class="empty-state">No weak spots yet. Keep drilling.</div>`
      : '';
  }
}

// --- Heatmap ---
function renderHeatmap() {
  const min = settings.min, max = settings.max;
  const size = max - min + 1;

  // Build grid: (size+1) x (size+1) with header row and col
  let html = '';
  const cols = size + 1;
  $('heatmap').style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  // Top-left corner
  html += `<div class="hm-header"></div>`;
  // Header row
  for (let b = min; b <= max; b++) {
    html += `<div class="hm-header">${b}</div>`;
  }

  for (let a = min; a <= max; a++) {
    // Row header
    html += `<div class="hm-header">${a}</div>`;
    for (let b = min; b <= max; b++) {
      const key = a <= b ? `${a}×${b}` : `${b}×${a}`;
      const f = facts[key];
      let cls = 'unseen';
      if (f && f.total > 0) {
        const pct = f.correct / f.total;
        const fast = f.avgTime < 2500;
        if (pct >= 0.9 && f.reps >= 3 && fast) cls = 'mastered';
        else if (pct >= 0.75 && f.avgTime < 4000) cls = 'good';
        else if (pct >= 0.5) cls = 'learning';
        else cls = 'struggling';
      }
      const label = `${a * b}`;
      html += `<div class="hm-cell ${cls}" title="${a}×${b}=${a * b}">${label}</div>`;
    }
  }

  $('heatmap').innerHTML = html;
}

// --- Settings ---
function loadSettings() {
  $('setMin').value = settings.min;
  $('setMax').value = settings.max;
  $('setSession').value = settings.sessionLen;
}

function saveSettings() {
  const min = Math.max(2, parseInt($('setMin').value) || 2);
  const max = Math.max(min, parseInt($('setMax').value) || 20);
  const sessionLen = Math.max(5, parseInt($('setSession').value) || 20);
  settings = { min, max, sessionLen };
  save();
}

$('setMin').addEventListener('change', saveSettings);
$('setMax').addEventListener('change', saveSettings);
$('setSession').addEventListener('change', saveSettings);

$('resetBtn').addEventListener('click', () => {
  if (confirm('Nuke all progress? This is irreversible.')) {
    facts = {};
    session = { correct: 0, total: 0, times: [], startedAt: null };
    streak = 0;
    recentResults = [];
    save();
    renderStreak();
    newQuestion();
  }
});

// --- Init ---
load();
loadSettings();
renderStreak();
updateSessionBtn();
newQuestion();
</script>
