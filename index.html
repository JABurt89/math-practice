<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Practice</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px;
      color: #1e1e2e;
    }
    h1 { font-size: 2.4rem; color: #4a6cf7; margin-bottom: 6px; }
    .subtitle { color: #666; margin-bottom: 28px; font-size: 1rem; }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(74,108,247,0.10);
      padding: 32px 36px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 28px; }
    .controls label { font-size: 0.85rem; color: #555; }
    .controls select, .controls input[type=range] {
      border: 1px solid #d0d7ff; border-radius: 8px; padding: 6px 10px;
      font-size: 0.9rem; background: #f7f8ff;
    }
    .group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    #question { font-size: 2.8rem; font-weight: 700; color: #222; margin: 12px 0 24px; letter-spacing: 1px; }
    #answer-input {
      width: 140px; font-size: 1.8rem; text-align: center;
      border: 2px solid #c4ceff; border-radius: 10px; padding: 8px 12px;
      outline: none; transition: border-color 0.2s;
    }
    #answer-input:focus { border-color: #4a6cf7; }
    #submit-btn {
      margin-top: 18px; background: #4a6cf7; color: #fff; border: none;
      border-radius: 10px; padding: 12px 36px; font-size: 1.1rem;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    #submit-btn:hover { background: #3550d4; }
    #submit-btn:active { transform: scale(0.97); }
    #feedback { margin-top: 16px; font-size: 1.3rem; font-weight: 600; min-height: 32px; }
    .correct { color: #2db86e; }
    .wrong { color: #e05252; }
    .scoreboard { display: flex; justify-content: center; gap: 32px; margin-top: 28px; padding-top: 20px; border-top: 1px solid #eef0ff; }
    .score-item { text-align: center; }
    .score-item .val { font-size: 1.8rem; font-weight: 700; color: #4a6cf7; }
    .score-item .lbl { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    #streak-bar-wrap { background: #eef0ff; border-radius: 8px; height: 10px; margin-top: 14px; overflow: hidden; }
    #streak-bar { height: 100%; background: linear-gradient(90deg, #4a6cf7, #7c3aed); border-radius: 8px; width: 0%; transition: width 0.4s; }
    #new-btn {
      margin-top: 20px; background: transparent; color: #4a6cf7;
      border: 2px solid #4a6cf7; border-radius: 10px; padding: 8px 24px;
      font-size: 0.95rem; cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    #new-btn:hover { background: #4a6cf7; color: #fff; }
  </style>
</head>
<body>
<h1>Math Practice</h1>
<p class="subtitle">Sharpen your arithmetic skills, one problem at a time.</p>
<div class="card">
  <div class="controls">
    <div class="group">
      <label for="op-select">Operation</label>
      <select id="op-select">
        <option value="mixed">Mixed</option>
        <option value="+">Addition</option>
        <option value="-">Subtraction</option>
        <option value="*">Multiplication</option>
        <option value="/">Division</option>
      </select>
    </div>
    <div class="group">
      <label for="difficulty">Max Number: <span id="diff-val">12</span></label>
      <input type="range" id="difficulty" min="2" max="50" value="12" />
    </div>
  </div>
  <div id="question">Loading...</div>
  <input type="number" id="answer-input" placeholder="?" autocomplete="off" />
  <br />
  <button id="submit-btn">Check</button>
  <button id="new-btn">Skip</button>
  <div id="feedback"></div>
  <div class="scoreboard">
    <div class="score-item"><div class="val" id="correct-count">0</div><div class="lbl">Correct</div></div>
    <div class="score-item"><div class="val" id="streak-count">0</div><div class="lbl">Streak</div></div>
    <div class="score-item"><div class="val" id="total-count">0</div><div class="lbl">Attempted</div></div>
  </div>
  <div id="streak-bar-wrap"><div id="streak-bar"></div></div>
</div>
<script>
  const ops = ['+','-','*','/'];
  let currentAnswer = 0, correct = 0, streak = 0, total = 0;
  const MAX_STREAK = 10;
  const qEl = document.getElementById('question');
  const inputEl = document.getElementById('answer-input');
  const feedbackEl = document.getElementById('feedback');
  const correctEl = document.getElementById('correct-count');
  const streakEl = document.getElementById('streak-count');
  const totalEl = document.getElementById('total-count');
  const barEl = document.getElementById('streak-bar');
  const diffEl = document.getElementById('difficulty');
  const diffValEl = document.getElementById('diff-val');
  const opEl = document.getElementById('op-select');
  diffEl.addEventListener('input', () => { diffValEl.textContent = diffEl.value; newQuestion(); });
  opEl.addEventListener('change', newQuestion);
  function rand(max) { return Math.floor(Math.random() * max) + 1; }
  function newQuestion() {
    feedbackEl.textContent = ''; inputEl.value = ''; inputEl.focus();
    const max = parseInt(diffEl.value);
    const opChoice = opEl.value === 'mixed' ? ops[Math.floor(Math.random()*ops.length)] : opEl.value;
    let a = rand(max), b = rand(max);
    if (opChoice === '-') { if (b > a) [a,b] = [b,a]; }
    if (opChoice === '/') { b = rand(max); a = b * rand(max); if (a > 200) a = b * rand(5); }
    const sym = {'+':'+','-':'−','*':'×','/':'÷'};
    qEl.textContent = a + ' ' + sym[opChoice] + ' ' + b + ' = ?';
    if (opChoice==='+') currentAnswer=a+b;
    else if (opChoice==='-') currentAnswer=a-b;
    else if (opChoice==='*') currentAnswer=a*b;
    else currentAnswer=a/b;
  }
  function checkAnswer() {
    const userVal = parseFloat(inputEl.value);
    if (inputEl.value.trim()===''||isNaN(userVal)) { feedbackEl.textContent='Enter a number first!'; feedbackEl.className='wrong'; return; }
    total++; totalEl.textContent=total;
    if (Math.abs(userVal-currentAnswer)<0.001) {
      correct++; streak++; correctEl.textContent=correct; streakEl.textContent=streak;
      feedbackEl.textContent = streak>=5 ? '🔥 Correct! On fire!' : '✅ Correct!';
      feedbackEl.className='correct';
    } else {
      streak=0; streakEl.textContent=0;
      feedbackEl.textContent='❌ Not quite. Answer: '+currentAnswer;
      feedbackEl.className='wrong';
    }
    barEl.style.width = Math.min(streak/MAX_STREAK*100,100)+'%';
    setTimeout(newQuestion,1200);
  }
  document.getElementById('submit-btn').addEventListener('click',checkAnswer);
  document.getElementById('new-btn').addEventListener('click',newQuestion);
  inputEl.addEventListener('keydown',e=>{ if(e.key==='Enter') checkAnswer(); });
  newQuestion();
</script>
</body>
</html>
